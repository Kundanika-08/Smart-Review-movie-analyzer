<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-page">
<div class="auth-overlay"></div>

<div class="auth-card">
<p class="brand">MOVIEVERSE</p>
<h1>Create Account</h1>
<p class="tagline">Join now to rate movies and build your watch cart.</p>

<form action="/register" method="POST" class="auth-form">
<label for="username">Username</label>
<input id="username" name="username" required placeholder="Choose a username">

<label for="password">Password</label>
<input id="password" name="password" type="password" required placeholder="Create a password">

<button type="submit" class="primary-btn">Sign Up</button>
</form>

{% if error %}
<p class="form-error">{{ error }}</p>
{% endif %}

<p class="auth-switch">Already have an account? <a href="/">Login</a></p>
</div>

</body>
</html>
